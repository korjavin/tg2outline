name: Deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pin SHA into docker-compose.yml on deploy branch
        env:
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B deploy
          IMAGE_REF="ghcr.io/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}"
          sed -i "s|image: ${IMAGE_REF}:.*|image: ${IMAGE_REF}:${GITHUB_COMMIT_SHA}|g" docker-compose.yml
          git add docker-compose.yml
          git commit -m "deploy: ${GITHUB_COMMIT_SHA}" || echo "No image change to commit"
          git push --force origin deploy

      - name: Trigger Portainer redeploy
        env:
          WEBHOOK_URL: ${{ secrets.PORTAINER_REDEPLOY_HOOK }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "PORTAINER_REDEPLOY_HOOK secret is not set; skipping webhook trigger."
            exit 0
          fi
          curl -fsSL -X POST "${WEBHOOK_URL}"
